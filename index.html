<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorena | Experiencia Estelar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      overflow:hidden;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial,sans-serif;
      background:radial-gradient(circle at 50% 20%, #16265c 0%, #060816 45%, #000 100%);
      position:relative;
    }

    .stars,.shooting-star,.deep-space, .nebula, .aurora, .floating-stars, .starfield-layer{position:absolute;inset:0;pointer-events:none}

    .deep-space{background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.02), transparent 35%), radial-gradient(circle at 20% 80%, rgba(0,100,255,.08), transparent 40%), radial-gradient(circle at 80% 20%, rgba(255,120,180,.06), transparent 35%)}

    .starfield-layer{background-image:radial-gradient(1px 1px at 12% 24%, #fff, transparent),radial-gradient(1px 1px at 22% 54%, #fff, transparent),radial-gradient(1px 1px at 62% 34%, #fff, transparent),radial-gradient(1px 1px at 72% 74%, #fff, transparent),radial-gradient(1px 1px at 92% 44%, #fff, transparent);opacity:.6;animation:driftStars 28s linear infinite}

    .nebula{background:radial-gradient(circle at 20% 30%, rgba(90,120,255,.18), transparent 35%),radial-gradient(circle at 75% 25%, rgba(255,180,220,.12), transparent 30%),radial-gradient(circle at 60% 70%, rgba(120,220,255,.10), transparent 35%);filter:blur(18px);animation:nebulaDrift 18s ease-in-out infinite alternate}

    .aurora{background:linear-gradient(120deg, rgba(90,140,255,.08), rgba(255,255,255,0), rgba(120,255,220,.06));filter:blur(30px);animation:auroraMove 12s ease-in-out infinite alternate}

    .floating-stars{background-image:radial-gradient(2px 2px at 8% 12%, #fff, transparent),radial-gradient(2px 2px at 30% 40%, #fff, transparent),radial-gradient(1px 1px at 70% 22%, #fff, transparent),radial-gradient(2px 2px at 82% 66%, #fff, transparent),radial-gradient(1px 1px at 52% 82%, #fff, transparent);animation:starFloat 20s linear infinite}

    .sky-glow{position:absolute;inset:0;pointer-events:none}

    .stars{
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 25% 70%, rgba(255,255,255,.8), transparent),
        radial-gradient(2px 2px at 70% 30%, rgba(255,255,255,.9), transparent),
        radial-gradient(1px 1px at 80% 80%, rgba(255,255,255,.8), transparent),
        radial-gradient(2px 2px at 55% 60%, rgba(255,255,255,1), transparent),
        radial-gradient(1px 1px at 40% 15%, rgba(255,255,255,.8), transparent),
        radial-gradient(2px 2px at 90% 10%, rgba(255,255,255,.9), transparent),
        radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,.7), transparent),
        radial-gradient(3px 3px at 35% 35%, rgba(255,255,255,.95), transparent),
        radial-gradient(2px 2px at 60% 12%, rgba(173,216,255,.9), transparent),
        radial-gradient(2px 2px at 88% 48%, rgba(255,255,255,.9), transparent);
      background-size: 100% 100%;
      animation: twinkle 3s infinite ease-in-out alternate;
      filter: drop-shadow(0 0 6px rgba(255,255,255,.35));
    }

    .sky-glow{
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.03), transparent 60%);
      animation: pulseSky 6s infinite ease-in-out;
    }

    @keyframes twinkle{
      0%{opacity:.7;transform:scale(1)}
      50%{opacity:1;transform:scale(1.01)}
      100%{opacity:.8;transform:scale(1)}
    }

    @keyframes nebulaDrift{0%{transform:translateX(0) translateY(0) scale(1)}100%{transform:translateX(20px) translateY(-15px) scale(1.08)}}

    @keyframes auroraMove{0%{transform:translateX(-20px)}100%{transform:translateX(20px)}}

    @keyframes starFloat{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}

    @keyframes driftStars{0%{transform:translateX(0) translateY(0)}50%{transform:translateX(-10px) translateY(6px)}100%{transform:translateX(0) translateY(0)}}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}

    @keyframes pulseSky{
      0%,100%{opacity:.6}
      50%{opacity:1}
    }

    .shooting-star::before{
      content:"";
      position:absolute;
      top:18%; left:-20%;
      width:180px; height:2px;
      background:linear-gradient(90deg,#fff,rgba(255,255,255,0));
      box-shadow:0 0 20px #fff;
      animation:shoot 8s infinite;
    }

    @keyframes shoot{
      0%,75%,100%{transform:translate(0,0);opacity:0}
      78%{opacity:1}
      100%{transform:translate(1600px,650px);opacity:0}
    }

    .moon,.planet{position:absolute;border-radius:50%;filter:drop-shadow(0 0 18px rgba(255,255,255,.35))}
    .moon{
      width:120px;height:120px;top:8%;right:10%;
      background:radial-gradient(circle at 35% 35%, #fffde8 0%, #e7e0b2 55%, #b5ae8b 100%);
      box-shadow:0 0 40px rgba(255,255,220,.35);
    }
    .jupiter{
      width:90px;height:90px;top:14%;left:10%;
      background:linear-gradient(180deg,#caa07c,#9c684e,#6d4635);
    }
    .saturn{
      width:78px;height:78px;top:28%;left:20%;
      background:radial-gradient(circle,#dfc892,#aa8f56);
    }
    .saturn::after{
      content:"";
      position:absolute;
      width:115px;height:22px;
      border:3px solid rgba(255,255,255,.45);
      border-radius:50%;
      top:28px;left:-18px;
      transform:rotate(-18deg);
    }

    .center-btn{
      position:absolute;
      z-index:20;
      padding:22px 48px;
      font-size:30px;
      font-weight:700;
      letter-spacing:1px;
      color:#fff;
      border:2px solid rgba(255,255,255,.8);
      border-radius:18px;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
      box-shadow:0 0 15px rgba(255,255,255,.7),0 0 40px rgba(108,180,255,.55);
      text-shadow:0 0 8px #fff,0 0 18px #9dd7ff;
      cursor:pointer;
      transition:.35s ease;
    }
    .center-btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 20px #fff,0 0 55px rgba(108,180,255,.8);
    }

    .lorena-title{
      position:absolute;
      top:12%;
      font-size:44px;
      color:#fff;
      text-shadow:0 0 10px #fff,0 0 25px #79c7ff;
      z-index:10;
      font-weight:600;
    }

    .scene{
      display:none;
      width:320px;
      height:320px;
      perspective:1200px;
      z-index:15;
    }

    .cube{
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      animation:rotate 14s linear infinite;
    }

    .face{
      position:absolute;
      width:320px;
      height:320px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.45);
      background:rgba(255,255,255,.08);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:24px;
      text-align:center;
      backdrop-filter:blur(10px);
      box-shadow:0 0 18px rgba(255,255,255,.18);
    }

    .face img{width:100%;height:100%;object-fit:cover;display:block}

    .caption{position:absolute;bottom:14px;left:14px;right:14px;color:#fff;font-size:20px;font-weight:600;text-shadow:0 0 8px rgba(0,0,0,.8);background:linear-gradient(to top, rgba(0,0,0,.45), rgba(0,0,0,0));padding:18px 12px 8px;border-radius:12px;z-index:3}

    .front{transform:translateZ(160px)}
    .back{transform:rotateY(180deg) translateZ(160px)}
    .right{transform:rotateY(90deg) translateZ(160px)}
    .left{transform:rotateY(-90deg) translateZ(160px)}
    .top{transform:rotateX(90deg) translateZ(160px)}
    .bottom{transform:rotateX(-90deg) translateZ(160px)}

    @keyframes cinematicReveal{\n      0%{opacity:0;transform:scale(.65) translateY(30px)}\n      100%{opacity:1;transform:scale(1) translateY(0)}\n    }\n\n    @keyframes rotate{
      from{transform:rotateX(-12deg) rotateY(0deg)}
      to{transform:rotateX(-12deg) rotateY(360deg)}
    }
  </style>
</head>
<body>
  <audio id="bgMusic" loop>
    <source src="josean-log-beso.mp3" type="audio/mpeg">
  </audio>
  <div class="deep-space"></div>
  <div class="nebula"></div>
  <div class="aurora"></div>
  <div class="floating-stars"></div>
  <div class="sky-glow"></div>
  <div class="stars"></div>
  <div class="shooting-star"></div>
  <div class="moon"></div>
  <div class="planet jupiter"></div>
  <div class="planet saturn"></div>

  <div class="lorena-title">Para Lorena ✨</div>
  <button class="center-btn" onclick="startExperience()">Iniciar experiencia</button>

  <div class="scene" id="scene">
    <div class="cube" id="cube">
      <div class="face front"><img src="foto1.jpeg" alt="foto 1"><span class="caption">tu sonrisa ilumina mi universo</span></div>
      <div class="face back"><img src="foto2.jpeg" alt="foto 2"><span class="caption">cada viaje contigo se siente eterno</span></div>
      <div class="face right"><img src="foto3.jpeg" alt="foto 3"><span class="caption">mi lugar favorito siempre eres tu</span></div>
      <div class="face left"><img src="foto4.jpeg" alt="foto 4"><span class="caption">contigo todo se ve mas bonito</span></div>
      <div class="face top">Lorena, cada estrella me recuerda tu luz ✨</div>
      <div class="face bottom">Esta experiencia fue creada solo para ti 💙</div>
    </div>
  </div>

  <script>\n    function startExperience(){\n      const btn = document.querySelector('.center-btn');\n      const title = document.querySelector('.lorena-title');\n      const scene = document.getElementById('scene');\n      const music = document.getElementById('bgMusic');\n\n      document.body.style.transition = 'transform 1.8s ease, filter 1.8s ease';\n      document.body.style.transform = 'scale(1.18)';\n      document.body.style.filter = 'brightness(1.15)';\n\n      btn.style.transition = 'opacity 0.8s ease';\n      title.style.transition = 'opacity 0.8s ease';\n      btn.style.opacity = '0';\n      title.style.opacity = '0';\n\n      let vol = 0;\n      music.volume = 0;\n      music.play().catch(()=>{});\n      const fade = setInterval(() => {\n        vol += 0.03;\n        music.volume = Math.min(vol, 0.35);\n        if (vol >= 0.35) clearInterval(fade);\n      }, 180);\n\n      setTimeout(() => {\n        btn.style.display = 'none';\n        title.style.display = 'none';\n        scene.style.display = 'block';\n        scene.style.animation = 'cinematicReveal 1.4s ease';\n        document.body.style.transform = 'scale(1)';\n        document.body.style.filter = 'brightness(1)';\n      }, 1200);\n    }\n\n    const cube = document.getElementById('cube');\n    let rotateY = 0;\n    document.addEventListener('click', function(e){\n      if(e.target.closest('.scene')){\n        rotateY += 90;\n        cube.style.animation = 'none';\n        cube.style.transform = `rotateX(-12deg) rotateY(${rotateY}deg)`;\n        cube.style.transition = 'transform 1s ease';\n      }\n    });\n  </script>
</body>
</html>
