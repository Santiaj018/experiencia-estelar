<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiencia Estelar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      overflow:hidden;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: radial-gradient(circle at top, #0b1d51 0%, #000 70%);
      font-family: Arial, sans-serif;
    }

    .stars, .shooting-star{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .stars::before, .stars::after{
      content:"";
      position:absolute;
      width:2px;
      height:2px;
      background:white;
      border-radius:50%;
      box-shadow:
        100px 100px white, 200px 300px white, 400px 150px white,
        600px 200px white, 800px 100px white, 1000px 350px white,
        1200px 220px white, 300px 500px white, 700px 600px white,
        1100px 500px white;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    .shooting-star::before{
      content:"";
      position:absolute;
      top:20%;
      left:-20%;
      width:120px;
      height:2px;
      background:linear-gradient(90deg, white, transparent);
      animation: shoot 6s infinite;
    }

    @keyframes shoot{
      0%,80%,100%{transform:translate(0,0);opacity:0}
      85%{opacity:1}
      100%{transform:translate(1400px,500px);opacity:0}
    }

    .moon, .planet{
      position:absolute;
      border-radius:50%;
      box-shadow:0 0 30px rgba(255,255,255,0.5);
    }

    .moon{
      width:100px;height:100px;
      background:#f5f3ce;
      top:10%; right:10%;
    }

    .jupiter{
      width:80px;height:80px;
      background:linear-gradient(#c97,#864);
      top:18%; left:12%;
    }

    .saturn{
      width:70px;height:70px;
      background:#d8c48c;
      top:28%; left:22%;
    }

    .saturn::after{
      content:"";
      position:absolute;
      width:100px;height:20px;
      border:3px solid rgba(255,255,255,0.5);
      border-radius:50%;
      top:22px; left:-15px;
      transform:rotate(-20deg);
    }

    .center-btn{
      position:absolute;
      z-index:5;
      padding:20px 40px;
      font-size:28px;
      color:white;
      background:rgba(255,255,255,0.08);
      border:2px solid white;
      border-radius:20px;
      box-shadow:0 0 15px #fff, 0 0 30px #66ccff;
      text-shadow:0 0 10px #fff;
      cursor:pointer;
      transition:0.3s;
    }

    .center-btn:hover{transform:scale(1.05)}

    .scene{
      display:none;
      width:220px;
      height:220px;
      perspective:1000px;
      z-index:10;
    }

   .front{transform:translateZ(160px)}
.back{transform:rotateY(180deg) translateZ(160px)}
.right{transform:rotateY(90deg) translateZ(160px)}
.left{transform:rotateY(-90deg) translateZ(160px)}
.top{transform:rotateX(90deg) translateZ(160px)}
.bottom{transform:rotateX(-90deg) translateZ(160px)}

    .face{
      position:absolute;
      width:220px;
      height:220px;
      border:1px solid rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.1);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:20px;
      text-align:center;
      backdrop-filter: blur(6px);
    }

.face{
    position:absolute;
    width:220px;
    height:220px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.5);
    background:rgba(255,255,255,0.1);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    text-align:center;
    backdrop-filter: blur(6px);
}

.face img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
}

    .front{transform:translateZ(110px)}
    .back{transform:rotateY(180deg) translateZ(110px)}
    .right{transform:rotateY(90deg) translateZ(110px)}
    .left{transform:rotateY(-90deg) translateZ(110px)}
    .top{transform:rotateX(90deg) translateZ(110px)}
    .bottom{transform:rotateX(-90deg) translateZ(110px)}

    @keyframes rotate{
      from{transform:rotateX(0) rotateY(0)}
      to{transform:rotateX(360deg) rotateY(360deg)}
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="shooting-star"></div>
  <div class="moon"></div>
  <div class="planet jupiter"></div>
  <div class="planet saturn"></div>

  <button class="center-btn" onclick="startExperience()">Iniciar experiencia</button>

  <div class="scene" id="scene">
    <div class="cube">
   <div class="face front"><img src="foto1.jpeg" alt="foto 1"></div>
<div class="face back"><img src="foto2.jpeg" alt="foto 2"></div>
<div class="face right"><img src="foto3.jpeg" alt="foto 3"></div>
<div class="face left"><img src="foto4.jpeg" alt="foto 4"></div>
      <div class="face top">Tu texto visual aquí</div>
      <div class="face bottom">Otro mensaje especial</div>
    </div>
  </div>

  <script>
    function startExperience(){
      document.querySelector('.center-btn').style.display='none';
      document.getElementById('scene').style.display='block';
    }
  </script>
</body>
</html>
